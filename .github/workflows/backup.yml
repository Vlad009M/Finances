name: Weekly Backup

on:
  schedule:
    - cron: '0 10 * * 0'  # Щонеділі о 10:00 UTC (12:00 Київ)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Supabase CLI
        run: |
          mkdir -p "$HOME/.local/share/supabase"
          curl -sL https://github.com/supabase/cli/releases/download/v2.101.0/supabase_2.101.0_linux_amd64.tar.gz \
            | tar -xzf - -C "$HOME/.local/share/supabase"
          export PATH="$HOME/.local/share/supabase:$PATH"
          echo "$HOME/.local/share/supabase" >> $GITHUB_PATH
          supabase --version

      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Dump database
        run: |
          supabase db dump \
            --db-url "postgresql://postgres.mlxfhxsgechaisdtftkz:${{ secrets.DB_PASSWORD }}@aws-0-eu-west-1.pooler.supabase.com:5432/postgres" \
            -f aperio_db_${{ steps.date.outputs.DATE }}.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create git bundle
        run: |
          git bundle create aperio_code_${{ steps.date.outputs.DATE }}.bundle --all

      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          repository: Vlad009M/aperio-backups
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          path: backup-repo

      - name: Copy and push backups
        run: |
          mkdir -p backup-repo/db backup-repo/code

          cp aperio_db_${{ steps.date.outputs.DATE }}.sql backup-repo/db/
          cp aperio_code_${{ steps.date.outputs.DATE }}.bundle backup-repo/code/

          cd backup-repo/db && ls -t *.sql 2>/dev/null | tail -n +9 | xargs rm -f || true
          cd ../code && ls -t *.bundle 2>/dev/null | tail -n +9 | xargs rm -f || true

          cd ..
          git config user.name "Aperio Backup Bot"
          git config user.email "backup@aperio.pp.ua"
          git add .
          git diff --staged --quiet || git commit -m "backup: ${{ steps.date.outputs.DATE }}"
          git push